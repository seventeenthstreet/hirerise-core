# =========================
# AUTH HARDENING
# =========================
[auth]
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_confirmations = true
secure_password_change = true
max_frequency = "60s"

# =========================
# EDGE RUNTIME (large repo optimization)
# =========================
[edge_runtime]
policy = "oneshot"